<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="badgeGrad" x1="40" y1="30" x2="480" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff2e87"/>
      <stop offset="0.55" stop-color="#ff5f6d"/>
      <stop offset="1" stop-color="#ffac2f"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="256" y1="90" x2="256" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33134d"/>
      <stop offset="1" stop-color="#160a22"/>
    </linearGradient>
    <linearGradient id="rayGrad" x1="320" y1="256" x2="480" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b0e2e"/>
      <stop offset="1" stop-color="#0b0612"/>
    </linearGradient>
  </defs>

  

  <!-- Badge circle -->
  <circle cx="256" cy="256" r="222" fill="url(#badgeGrad)"/>

  <!-- Liberation / voice rays, fanning outward from behind the head -->
  <g stroke="url(#rayGrad)" stroke-linecap="round" fill="none" opacity="0.92">
    <path d="M 318 150 L 446 96" stroke-width="7"/>
    <path d="M 336 188 L 468 162" stroke-width="6"/>
    <path d="M 346 230 L 480 224" stroke-width="8"/>
    <path d="M 346 282 L 480 290" stroke-width="6"/>
    <path d="M 332 326 L 458 360" stroke-width="7"/>
    <path d="M 308 360 L 410 414" stroke-width="5"/>
  </g>

  <!-- Head silhouette: clean rounded hood shape, smooth, symmetric -->
  <path d="M 256 90
           C 178 90 130 150 128 222
           C 126 280 148 326 188 360
           C 178 380 178 396 188 408
           C 214 416 240 410 256 396
           C 272 410 298 416 324 408
           C 334 396 334 380 324 360
           C 364 326 386 280 384 222
           C 382 150 334 90 256 90 Z"
        fill="url(#faceGrad)"/>

  <!-- Rim-light highlight along the outer contour -->
  <path d="M 256 90 C 178 90 130 150 128 222 C 126 280 148 326 188 360"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Subtle synthetic / AI facet lines near the hairline -->
  <g stroke="#ffffff" stroke-opacity="0.14" stroke-width="2.5" fill="none">
    <path d="M 178 140 L 246 110"/>
    <path d="M 196 168 L 286 124"/>
  </g>

  <!-- Closed, serene eyes -->
  <g stroke="#f6ecff" stroke-width="11" stroke-linecap="round" fill="none">
    <path d="M 188 246 Q 210 262 234 246"/>
    <path d="M 278 246 Q 300 262 322 246"/>
  </g>

  <!-- Calm, confident closed smile -->
  <path d="M 218 316 Q 256 338 296 314" stroke="#f6ecff" stroke-width="9"
        stroke-linecap="round" fill="none" opacity="0.9"/>
</svg>
